<div class="login-container">
  <div class="filter">
    <form (ngSubmit)="onLogin()">

      <div>
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="mario@test.it"
          required
        />
      </div>

      <div>
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          required
        />
      </div>

      @if (errore) {
        <p class="errore">{{ errore }}</p>
      }

      <button type="submit">Login</button>
      <button type="button" (click)="goToRegister()">Registrati</button>

    </form>
  </div>
</div>
