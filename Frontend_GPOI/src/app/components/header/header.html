<header class="header">
  <div class="nav-container">

    <div class="logo">
      <a routerLink="/home">Progetto Recensioni</a>
    </div>

    <ul class="nav-menu" [class.active]="mobileMenuAperto">
      @if (authService.isAdmin()) {
        <li><a routerLink="/admin" (click)="mobileMenuAperto = false">Dashboard Admin</a></li>
      }
      <li><a routerLink="/home" (click)="mobileMenuAperto = false">Home</a></li>
      <li><a routerLink="/recensioni" (click)="mobileMenuAperto = false">Recensioni</a></li>

    </ul>

    <div class="account-area">

      @if (authService.isLoggedIn()) {
        <div class="account-dropdown">
          <div class="dropdown-trigger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <span>{{ authService.getNomeUtente() }}</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <polyline points="6 9 12 15 18 9" />
            </svg>
          </div>
          <div class="dropdown-menu">
            <a routerLink="/profilo">Il mio profilo</a>
            <a routerLink="/recensioni">Le mie recensioni</a>
            <a (click)="logout()">Logout</a>
          </div>
        </div>

      } @else {
        <div class="account-area">
          <a routerLink="/login" class="btn-login">Accedi</a>
        </div>
      }

    </div>

    <button class="mobile-toggle" (click)="toggleMobileMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </div>
</header>
